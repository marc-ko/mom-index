<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝妈指数 · Mom Index</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-bottom: 1px solid #334155;
  padding: 20px 32px;
  text-align: center;
}
.header h1 {
  font-size: 28px;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.header .subtitle {
  color: #94a3b8;
  font-size: 14px;
}
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

/* 指数卡片网格 */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 32px; }
.card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.card.nasdaq::before   { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
.card.gold::before     { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.card.cpo::before      { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
.card.semiconductor::before { background: linear-gradient(90deg, #10b981, #34d399); }

.card .sector-name { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
.card .index-value { font-size: 48px; font-weight: 800; margin-bottom: 4px; }
.card .index-label { font-size: 14px; color: #64748b; margin-bottom: 12px; }
.card .signal { font-size: 13px; padding: 4px 10px; border-radius: 6px; display: inline-block; }
.card .signal.red    { background: rgba(239,68,68,0.15); color: #f87171; }
.card .signal.orange { background: rgba(251,146,60,0.15); color: #fb923c; }
.card .signal.yellow { background: rgba(250,204,21,0.15); color: #facc15; }
.card .signal.green  { background: rgba(34,197,94,0.15); color: #4ade80; }
.card .signal.blue   { background: rgba(59,130,246,0.15); color: #60a5fa; }

.card .detail-row {
  display: flex; justify-content: space-between;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid #334155;
  font-size: 12px; color: #64748b;
}
.card .detail-row span { color: #cbd5e1; }

/* 图表区域 */
.charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; }
.chart-box {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
}
.chart-box h3 { font-size: 16px; margin-bottom: 16px; color: #e2e8f0; }

/* Top 小白帖 */
.top-posts {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
  margin-top: 24px;
}
.top-posts h3 { font-size: 16px; margin-bottom: 16px; }
.post-item {
  padding: 12px;
  border-bottom: 1px solid #334155;
  font-size: 13px;
}
.post-item:last-child { border-bottom: none; }
.post-item .post-title { color: #e2e8f0; margin-bottom: 4px; }
.post-item .post-meta { color: #64748b; font-size: 11px; }
.post-item .post-reason { color: #94a3b8; font-size: 12px; margin-top: 4px; font-style: italic; }
.post-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  margin-right: 8px;
}
.post-badge.pure   { background: rgba(239,68,68,0.2); color: #fca5a5; }
.post-badge.semi   { background: rgba(251,146,60,0.2); color: #fdba74; }

/* 图例 */
.legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.legend-dot.nasdaq   { background: #06b6d4; }
.legend-dot.gold     { background: #fbbf24; }
.legend-dot.cpo      { background: #a78bfa; }
.legend-dot.semiconductor { background: #34d399; }

.footer { text-align: center; padding: 32px; color: #475569; font-size: 12px; }

/* 加载状态 */
.loading { text-align: center; padding: 60px; color: #64748b; }

@media (max-width: 600px) {
  .charts { grid-template-columns: 1fr; }
  .card .index-value { font-size: 36px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>👩‍👧 宝妈指数</h1>
  <div class="subtitle">当小白开始讨论投资，就是该警惕的时候</div>
  <div class="subtitle" id="update-time" style="margin-top:4px"></div>
</div>

<div class="container">
  <!-- 四个板块指数卡片 -->
  <div class="cards" id="cards"></div>

  <!-- 图例 -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot nasdaq"></div>纳斯达克</div>
    <div class="legend-item"><div class="legend-dot gold"></div>黄金</div>
    <div class="legend-item"><div class="legend-dot cpo"></div>CPO通信</div>
    <div class="legend-item"><div class="legend-dot semiconductor"></div>半导体</div>
  </div>

  <!-- 历史曲线 -->
  <div class="charts">
    <div class="chart-box"><h3>📈 纳斯达克 — 宝妈指数走势</h3><canvas id="chart-nasdaq"></canvas></div>
    <div class="chart-box"><h3>🥇 黄金 — 宝妈指数走势</h3><canvas id="chart-gold"></canvas></div>
    <div class="chart-box"><h3>🔌 CPO通信 — 宝妈指数走势</h3><canvas id="chart-cpo"></canvas></div>
    <div class="chart-box"><h3>💾 半导体 — 宝妈指数走势</h3><canvas id="chart-semiconductor"></canvas></div>
  </div>

  <!-- Top 小白帖 -->
  <div class="top-posts" id="top-posts">
    <h3>🔥 今日最"小白"的帖子</h3>
    <div class="loading">加载中...</div>
  </div>
</div>

<div class="footer">
  宝妈指数 v1.0 — 数据来源: 东方财富股吧 · 小红书 · 抖音<br>
  指数越高 = 小白越活跃 = 市场情绪越危险<br>
  <span style="color:#64748b">⚠️ 仅供参考，不构成投资建议</span>
</div>

<script>
const SECTOR_NAMES = {
  nasdaq: '纳斯达克',
  gold: '黄金', 
  cpo: 'CPO通信',
  semiconductor: '半导体'
};

const SECTOR_COLORS = {
  nasdaq: '#06b6d4',
  gold: '#fbbf24',
  cpo: '#a78bfa',
  semiconductor: '#34d399'
};

function getSignalClass(idx) {
  if (idx >= 75) return 'red';
  if (idx >= 60) return 'orange';
  if (idx >= 40) return 'yellow';
  if (idx >= 20) return 'green';
  return 'blue';
}

function getEmoji(idx) {
  if (idx >= 75) return '🔴';
  if (idx >= 60) return '🟠';
  if (idx >= 40) return '🟡';
  if (idx >= 20) return '🟢';
  return '🔵';
}

function renderCards(data) {
  const container = document.getElementById('cards');
  const latest = data.latest;
  if (!latest) {
    container.innerHTML = '<div class="loading">暂无数据，请先运行 pipeline.py</div>';
    return;
  }

  document.getElementById('update-time').textContent = 
    `更新于 ${latest.date}`;

  container.innerHTML = Object.entries(latest.sectors).map(([key, sector]) => {
    const cls = getSignalClass(sector.index);
    const d = sector.details || {};
    return `
      <div class="card ${key}">
        <div class="sector-name">${getEmoji(sector.index)} ${SECTOR_NAMES[key]}</div>
        <div class="index-value">${sector.index}</div>
        <div class="index-label">宝妈指数</div>
        <div class="signal ${cls}">${sector.interpretation}</div>
        <!-- 买入/卖出子指数 -->
        <div style="margin-top:14px; display:flex; gap:8px;">
          <div style="flex:1; background:rgba(34,197,94,0.08); border-radius:8px; padding:8px; text-align:center;">
            <div style="font-size:20px; font-weight:700; color:#4ade80;">${d.mom_buy_index ?? 0}</div>
            <div style="font-size:10px; color:#64748b;">🟢 宝妈买入</div>
          </div>
          <div style="flex:1; background:rgba(239,68,68,0.08); border-radius:8px; padding:8px; text-align:center;">
            <div style="font-size:20px; font-weight:700; color:#f87171;">${d.mom_sell_index ?? 0}</div>
            <div style="font-size:10px; color:#64748b;">🔴 宝妈卖出</div>
          </div>
        </div>
        <!-- 买卖比进度条 -->
        <div style="margin-top:8px; display:flex; align-items:center; gap:6px; font-size:10px; color:#64748b;">
          <span>卖出 ${d.sell_count||0}</span>
          <div style="flex:1; height:5px; background:#2d1f1f; border-radius:3px; overflow:hidden; display:flex;">
            <div style="width:${(d.buy_count||0)/(Math.max(d.buy_count||0, d.sell_count||0, 1))*100}%; height:100%; background:linear-gradient(90deg,#22c55e,#4ade80);"></div>
          </div>
          <span>买入 ${d.buy_count||0}</span>
        </div>
        <div class="detail-row">
          <span>小白帖</span><span>${d.newbie_posts || 0}/${d.valid_posts || d.total_posts || 0} (${d.newbie_ratio || 0}%)</span>
        </div>
        <div class="detail-row">
          <span>买卖比</span><span style="color:${(d.buy_sell_ratio||0)>1.5?'#f87171':(d.buy_sell_ratio||0)>0.8?'#facc15':'#4ade80'}">${d.buy_sell_ratio||0}:1 ${(d.buy_sell_ratio||0)>1.5?'🔥追涨':(d.buy_sell_ratio||0)>0.8?'⚖️平衡':'🩸恐慌'}</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderCharts(data) {
  const history = data.sector_history || {};
  
  Object.entries(history).forEach(([sector, records]) => {
    const canvasId = `chart-${sector}`;
    const canvas = document.getElementById(canvasId);
    if (!canvas || !records.length) return;
    
    const ctx = canvas.getContext('2d');
    const color = SECTOR_COLORS[sector] || '#94a3b8';
    
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: records.map(r => r.date.slice(5)), // MM-DD
        datasets: [{
          label: SECTOR_NAMES[sector],
          data: records.map(r => r.index),
          borderColor: color,
          backgroundColor: color + '20',
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 2,
          pointHoverRadius: 5,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e293b',
            titleColor: '#e2e8f0',
            bodyColor: '#cbd5e1',
            borderColor: '#334155',
            borderWidth: 1,
            callbacks: {
              label: ctx => `宝妈指数: ${ctx.parsed.y}`
            }
          }
        },
        scales: {
          y: {
            min: 0, max: 100,
            grid: { color: '#33415533' },
            ticks: { color: '#64748b', callback: v => v },
          },
          x: {
            grid: { color: '#33415533' },
            ticks: { color: '#64748b', maxTicksLimit: 10 },
          }
        },
        // 危险区间背景
        // 通过 annotation 插件可以实现，这里保持简洁
      }
    });
  });
}

function renderTopPosts(data) {
  const container = document.getElementById('top-posts');
  const latest = data.latest;
  if (!latest) {
    container.innerHTML += '<div class="loading">暂无数据</div>';
    return;
  }

  // 从所有板块收集 top 小白帖
  let allTop = [];
  Object.entries(latest.sectors).forEach(([sector, sdata]) => {
    (sdata.top_newbie_posts || []).forEach(p => {
      allTop.push({ ...p, sector: SECTOR_NAMES[sector] });
    });
  });

  // 按分数排序
  allTop.sort((a, b) => b.score - a.score);
  allTop = allTop.slice(0, 8);

  if (!allTop.length) {
    container.innerHTML += '<div class="loading">今日暂无典型小白帖</div>';
    return;
  }

  const badgeClass = score => score >= 50 ? 'pure' : 'semi';
  const badgeText = score => score >= 50 ? '纯小白' : '偏小白';

  container.innerHTML += allTop.map(p => `
  <div class="post-item">
    <div class="post-title">
      <span class="post-badge ${badgeClass(p.score)}">${badgeText(p.score)} ${p.score}分</span>
      <span style="color:#64748b;font-size:11px">[${p.sector}]</span>
      ${p.intent_label ? `<span style="font-size:11px;margin-left:4px">${p.intent_label}</span>` : ''}
      ${p.title}
    </div>
    ${p.reasoning ? `<div class="post-reason">📝 ${p.reasoning}</div>` : ''}
    ${p.key_signals ? p.key_signals.map(s => `<div class="post-meta">▸ ${s}</div>`).join('') : ''}
  </div>
  `).join('');
}

// 加载数据
fetch('data/dashboard_data.json')
  .then(r => r.json())
  .then(data => {
    renderCards(data);
    renderCharts(data);
    renderTopPosts(data);
  })
  .catch(err => {
    document.getElementById('cards').innerHTML = 
      `<div class="loading">⚠️ 数据加载失败: ${err.message}<br>请先运行 pipeline.py 生成数据</div>`;
  });
</script>
</body>
</html>

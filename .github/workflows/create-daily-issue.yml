name: Create Daily Mom Index Issue

on:
  schedule:
    # GitHub cron uses UTC. 00:00 UTC is 08:00 in Hong Kong.
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/create-daily-issue.yml"
      - ".github/ISSUE_TEMPLATE.md"
      - "data/dashboard_data.json"
      - "data/history.json"
      - "frontend/dashboard.html"

permissions:
  contents: write
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse issue template
        id: template
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          template = Path(".github/ISSUE_TEMPLATE.md").read_text(encoding="utf-8")
          if not template.startswith("---\n"):
              raise SystemExit("ISSUE_TEMPLATE.md must start with YAML front matter")

          _, front_matter, body = template.split("---", 2)
          fields = {}
          for line in front_matter.splitlines():
              if ":" not in line:
                  continue
              key, value = line.split(":", 1)
              fields[key.strip()] = value.strip()

          title = fields.get("title")
          labels = fields.get("labels", "")
          if not title:
              raise SystemExit("ISSUE_TEMPLATE.md front matter is missing title")

          Path("issue-body.md").write_text(body.lstrip(), encoding="utf-8")
          Path("issue-title.txt").write_text(title, encoding="utf-8")
          Path("issue-labels.txt").write_text(labels, encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"title={title}\n")
              out.write(f"labels={labels}\n")
          PY

      - name: Check for existing open issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh issue list --state open --limit 100 --json title > open-issues.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          title = Path("issue-title.txt").read_text(encoding="utf-8")
          issues = json.loads(Path("open-issues.json").read_text(encoding="utf-8"))
          exists = any(issue.get("title") == title for issue in issues)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"exists={'true' if exists else 'false'}\n")
          PY

      - name: Create issue
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          title="$(cat issue-title.txt)"
          labels="$(cat issue-labels.txt)"
          if [ -n "$labels" ]; then
            gh issue create --title "$title" --body-file issue-body.md --label "$labels"
          else
            gh issue create --title "$title" --body-file issue-body.md
          fi

      - name: Prepare dashboard Pages artifact
        shell: bash
        run: |
          mkdir -p public/data
          cp frontend/dashboard.html public/dashboard.html
          cp data/dashboard_data.json public/data/dashboard_data.json
          cp data/history.json public/data/history.json
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=dashboard.html">
            <title>宝妈指数</title>
          </head>
          <body>
            <p><a href="dashboard.html">Open Mom Index dashboard</a></p>
          </body>
          </html>
          HTML

      - name: Publish dashboard to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
